# Single source of truth for paths and analysis parameters.
# Paths are relative to the project root.

seed: 42

paths:
  raw_data: data/raw/survey_raw.csv
  processed_data: data/processed/analysis.csv
  tables_dir: results/tables
  figures_dir: results/figures

synthetic:
  n_respondents: 1500
  # Approximate marginal rates used by the generator (kept realistic, not real data).
  urban_share: 0.62
  female_share: 0.51
  insured_share: 0.45

modelling:
  outcome: self_medication            # binary 0/1
  ses_reference: "Low"                # reference category for SES tertile
  covariates:
    - age
    - sex
    - residence
    - health_insurance
  alpha: 0.05

mediation:
  # X = ses_score (SES composite), M = hisb_score, Y = self_medication
  n_boot: 1000
